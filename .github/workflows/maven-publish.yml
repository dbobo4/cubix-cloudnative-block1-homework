name: Homework - Maven build, Docker publish, Docker verify

on:
  push:
    branches:
      - main

jobs:
  maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: target/*.jar

  docker:
    runs-on: ubuntu-latest
    needs: maven
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: .

      - name: Login to GHCR
        run: docker login ghcr.io -u dbobo4 -p ${{ github.token }}

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag ghcr.io/dbobo4/cubix/1/homework/app:springboot

      - name: Push Docker image
        run: docker push ghcr.io/dbobo4/cubix/1/homework/app:springboot

  verify:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: docker login ghcr.io -u dbobo4 -p ${{ github.token }}

      - name: Verify image
        run: sh ./verify-image.sh
